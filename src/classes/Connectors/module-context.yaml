## ---------------------------------------------------------------
## CONNECTORS MODULE
## ---------------------------------------------------------------

moduleMetaData:
  id: "connectors"
  label: "Connectors"
  description: "Scaffold for building HTTP connector classes to access external APIs, supporting GET, POST, PUT, and DELETE methods."
  keywords:
    - HTTP connector (base class for building typed REST API clients with GET/POST/PUT/DELETE support)

documents:
  - description: 'Connectors - Overview'
    outputPath: 'modules/connectors/overview.md'
    sources:
      - type: file
        description: "Connectors Overview"
        sourcePaths:
          - README.md
        filePattern: "README.md"

  - description: 'Connectors - Core Architecture'
    outputPath: 'modules/connectors/architecture-core.md'
    sources:
      - type: file
        description: "Connector base classes and method signatures"
        sourcePaths:
          - ./
          - ./Connector
        excludePatterns:
          - 'Request/'
          - 'Response/'
          - 'Headers/'
          - 'Cache/'
        filePattern: "*.php"
        modifiers:
          - name: php-content-filter
            options:
              method_visibility: [ "public" ]
              exclude_methods: [ "__construct" ]
              property_visibility: [ "public" ]
              constant_visibility: [ "public" ]
              keep_method_bodies: false
              keep_doc_comments: true

  - description: 'Connectors - Request & Response Architecture'
    outputPath: 'modules/connectors/architecture-request-response.md'
    sources:
      - type: file
        description: "HTTP request, response, and header class signatures"
        sourcePaths:
          - ./Request
          - ./Response
          - ./Headers
        filePattern: "*.php"
        modifiers:
          - name: php-content-filter
            options:
              method_visibility: [ "public" ]
              exclude_methods: [ "__construct" ]
              property_visibility: [ "public" ]
              constant_visibility: [ "public" ]
              keep_method_bodies: false
              keep_doc_comments: true

  - description: 'Connectors - Class File Structure'
    outputPath: 'modules/connectors/class-tree.md'
    overwrite: true
    sources:
      -
        type: tree
        description: 'Tree of PHP Class Files'
        sourcePaths:
          - ./
        filePattern: '*'
        renderFormat: ascii
        enabled: true
        showCharCount: false
        maxDepth: 6