## ---------------------------------------------------------------
## APPLICATION COMPOSER — Build-Time Documentation Generators
## ---------------------------------------------------------------

moduleMetaData:
  id: "composer"
  label: "Application Composer"
  description: "Build-time utilities that generate Markdown documentation artefacts (Modules Overview and Keyword Glossary) from module-context.yaml files discovered throughout the codebase, generate the OpenAPI 3.1 specification JSON, generate the API .htaccess for RESTful URL rewriting, and rebuild application custom icon methods from JSON definitions. Includes a shared BuildMessages registry for build-time notices. All steps are orchestrated by ComposerScripts::build()."
  keywords:
    - KeywordGlossaryGenerator (build-time tool that produces module-glossary.md from module keywords)
    - ModulesOverviewGenerator (build-time tool that produces modules-overview.md from module-context.yaml files)
    - "ComposerScripts (orchestrates all composer build steps: cache clearing, event/admin indexing, API method index, OpenAPI spec generation, .htaccess generation, CSS classes, context date, module docs)"
    - "IconBuilder (build-time code generator that reads custom-icons.json and writes typed PHP and JS icon accessor methods into target files)"
    - "custom-icons.json (JSON source file defining application-specific FontAwesome icon mappings for the IconBuilder)"
    - "CustomIcon (application-level PHP class extending UI_Icon whose methods are auto-generated by the IconBuilder)"
  relatedModules:
    - event-handler

documents:
  -
    description: 'Application Composer - Overview'
    outputPath: 'modules/composer/overview.md'
    sources:
      - type: file
        description: "Application\\Composer Overview"
        sourcePaths:
          - README.md
        filePattern: "README.md"

  -
    description: 'Application Composer - Core Architecture (Public API)'
    outputPath: 'modules/composer/architecture-core.md'
    sources:
      - type: file
        description: "BuildMessages, ComposerScripts, CSSClassesGenerator"
        sourcePaths:
          - ./
        filePattern: "*.php"
        modifiers:
          - name: php-content-filter
            options:
              method_visibility: [ "public" ]
              exclude_methods: [ "__construct" ]
              property_visibility: [ "public" ]
              constant_visibility: [ "public" ]
              keep_method_bodies: false
              keep_doc_comments: true

  -
    description: 'Application Composer - ModulesOverview Subpackage'
    outputPath: 'modules/composer/architecture-modules-overview.md'
    sources:
      - type: file
        description: "ModulesOverview generator classes"
        sourcePaths:
          - ./ModulesOverview
        filePattern: "*.php"
        modifiers:
          - name: php-content-filter
            options:
              method_visibility: [ "public" ]
              exclude_methods: [ "__construct" ]
              property_visibility: [ "public" ]
              constant_visibility: [ "public" ]
              keep_method_bodies: false
              keep_doc_comments: true

  -
    description: 'Application Composer - KeywordGlossary Subpackage'
    outputPath: 'modules/composer/architecture-keyword-glossary.md'
    sources:
      - type: file
        description: "KeywordGlossary generator classes and offline event"
        sourcePaths:
          - ./KeywordGlossary
        filePattern: "*.php"
        modifiers:
          - name: php-content-filter
            options:
              method_visibility: [ "public" ]
              exclude_methods: [ "__construct" ]
              property_visibility: [ "public" ]
              constant_visibility: [ "public" ]
              keep_method_bodies: false
              keep_doc_comments: true

  -
    description: 'Application Composer - IconBuilder Subpackage'
    outputPath: 'modules/composer/architecture-icon-builder.md'
    sources:
      - type: file
        description: "IconBuilder code-generation pipeline"
        sourcePaths:
          - ./IconBuilder
        filePattern: "*.php"
        modifiers:
          - name: php-content-filter
            options:
              method_visibility: [ "public" ]
              exclude_methods: [ "__construct" ]
              property_visibility: [ "public" ]
              constant_visibility: [ "public" ]
              keep_method_bodies: false
              keep_doc_comments: true

  -
    description: 'Application Composer - File Structure'
    outputPath: 'modules/composer/file-structure.md'
    overwrite: true
    sources:
      -
        type: tree
        description: 'Tree of PHP Class Files'
        sourcePaths:
          - ./
        filePattern: '*'
        renderFormat: ascii
        enabled: true
        showCharCount: false
        maxDepth: 4
