## ---------------------------------------------------------------
## ADMIN MODULE
## ---------------------------------------------------------------

moduleMetaData:
  id: "admin"
  label: "Administration Screens"
  description: "Hierarchical administration screen system providing the Area → Mode → Submode → Action screen lifecycle, rendering pipeline, rights, locking, and navigation."
  keywords:
    - Skeleton (base class defining the full rendering lifecycle for every admin screen)
    - Area (top-level admin section grouping related modes)
    - Mode (primary screen within an area)
    - Submode (secondary screen within a mode)
    - Action (an operation executed within a submode or mode)
    - AdminScreenIndex (build-time index of all registered admin screens)
    - RequestType (typed request parameter helper for fetching records from HTTP requests)
    - Wizard (multi-step screen flow with step validation and invalidation handling)
    - WizardConfigurator (session orchestrator and URL builder for the Wizard Preselection API)
    - WizardPreselection (typed key/value container for pre-populating wizard step fields before redirect)
  relatedModules:
    - ui
    - event-handler
    - application-sets

documents:
-
  description: 'Admin - Overview'
  outputPath: 'modules/admin/overview.md'
  sources:
    - type: file
      description: "Admin Module Overview"
      sourcePaths:
        - README.md
      filePattern: "README.md"

-
  description: 'Admin - Core Architecture'
  outputPath: 'modules/admin/architecture-core.md'
  sources:
    - type: text
      content: |
        # Admin Module — Core Architecture

        Public API surface of the admin screen system: the Skeleton base class,
        area/mode/submode base classes, screen rights, request types, and URL helper.
    - type: file
      description: "Root-level classes and interfaces"
      sourcePaths:
        - ./
      filePattern: "*.php"
      excludePatterns:
        - 'Area/'
        - 'Index/'
        - 'RequestTypes/'
        - 'Screens/'
        - 'Traits/'
        - 'Welcome/'
        - 'Wizard/'
        - 'docs/'
      modifiers:
        - name: php-content-filter
          options:
            method_visibility: [ "public" ]
            exclude_methods: [ "__construct" ]
            property_visibility: [ "public" ]
            constant_visibility: [ "public" ]
            keep_method_bodies: false
            keep_doc_comments: true
    - type: file
      description: "Area base classes and mode hierarchy"
      sourcePaths:
        - ./Area
      filePattern: "*.php"
      modifiers:
        - name: php-content-filter
          options:
            method_visibility: [ "public" ]
            exclude_methods: [ "__construct" ]
            property_visibility: [ "public" ]
            constant_visibility: [ "public" ]
            keep_method_bodies: false
            keep_doc_comments: true
    - type: file
      description: "Request type helpers"
      sourcePaths:
        - ./RequestTypes
      filePattern: "*.php"
      modifiers:
        - name: php-content-filter
          options:
            method_visibility: [ "public" ]
            exclude_methods: [ "__construct" ]
            property_visibility: [ "public" ]
            constant_visibility: [ "public" ]
            keep_method_bodies: false
            keep_doc_comments: true
    - type: file
      description: "Developer mode interface and trait"
      sourcePaths:
        - ./Traits
      filePattern: "*.php"
      modifiers:
        - name: php-content-filter
          options:
            method_visibility: [ "public" ]
            exclude_methods: [ "__construct" ]
            property_visibility: [ "public" ]
            constant_visibility: [ "public" ]
            keep_method_bodies: false
            keep_doc_comments: true

