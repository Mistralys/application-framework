          options:
            method_visibility: [ "public" ]
            exclude_methods: [ "__construct" ]
            property_visibility: [ "public" ]
            constant_visibility: [ "public" ]
            keep_method_bodies: false
            keep_doc_comments: true

-
  description: 'Admin - File Structure'
  outputPath: 'modules/admin/file-structure.md'
  sources:
    - type: text
      content: |
        # Admin Module — File Structure
    - type: tree
      description: 'Admin module file tree'
      sourcePaths: [ ./ ]
      filePattern: '*.php'
      notPath:
        - 'docs/'
      renderFormat: ascii
      showCharCount: false
      maxDepth: 4
