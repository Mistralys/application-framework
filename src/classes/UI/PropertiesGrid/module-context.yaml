## ---------------------------------------------------------------
## UI - PROPERTIES GRID SUBMODULE
## ---------------------------------------------------------------

moduleMetaData:
  id: "ui-properties-grid"
  label: "UI Properties Grid"
  description: "Renders a key/value property table for detail views, supporting typed property variants, inline action buttons, and conditional row visibility."
  relatedModules:
    - ui

documents:
-
  description: 'UI Properties Grid - Overview'
  outputPath: 'modules/ui/properties-grid/overview.md'
  sources:
    - type: file
      description: "PropertiesGrid README"
      sourcePaths:
        - README.md
      filePattern: "README.md"

-
  description: 'UI Properties Grid - Architecture'
  outputPath: 'modules/ui/properties-grid/architecture.md'
  sources:
    - type: file
      description: "Public class signatures for the grid and property types"
      sourcePaths:
        - ./
        - ./Property
        - ../PropertiesGrid.php
      filePattern: "*.php"
      modifiers:
        - name: php-content-filter
          options:
            method_visibility: [ "public" ]
            exclude_methods: [ "__construct" ]
            property_visibility: [ "public" ]
            constant_visibility: [ "public" ]
            keep_method_bodies: false
            keep_doc_comments: true
